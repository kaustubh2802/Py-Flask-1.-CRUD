<!DOCTYPE html>
<html>

<head>

<title>Add Student</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h1 class="page-title">
Add Student
</h1>

<div class="card">

<form method="POST">

<div class="form-group">

<input
type="text"
name="name"
placeholder="Student Name"
class="form-control"
required>

</div>

<div class="form-group">

<input
type="email"
name="email"
placeholder="Email"
class="form-control"
required>

</div>

<div class="form-group">

<input
type="text"
name="course"
placeholder="Course"
class="form-control"
required>

</div>

<button
type="submit"
class="btn btn-success">

Save Student

</button>

</form>

</div>

</div>

</body>
</html>
